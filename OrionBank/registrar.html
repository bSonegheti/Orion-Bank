<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main/CSS/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./main/CSS/login.css">
    <title>Login Orion's Bank</title>
</head>
<body>
    <header>
        <div class="header-box1">
            <h1>ORION BANK</h1>
        </div>
        <div class="header-box2">
            <ul>
                <li><a href="./index.html">HOME</a></li>
                <li><a href="./sobre.html">SOBRE</a></li>
                <li><a href="./login.html">LOGIN</a></li>
                <li><a href="./registrar.html">REGISTRAR</a></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="box-login1">
            <input id="email-Registrar" type="text" placeholder="Insira seu Email">
            <input id="nomeCompleto-Registrar" type="text" placeholder="Insira seu nome completo">
            <input id="senha-Registrar" type="password" placeholder="Crie uma senha segura">
            <input id="cpf-Registrar" type="text" placeholder="Insira seu CPF">
            <input id="nasc-Registrar" type="text" placeholder="Data de nascimento">
            <button id="botao-Registrar">Entrar</button>
            <p><a href="#">Recuperar senha</a></p>
        </div>
    </main>

    <footer>
        <div class="footer-box1">
            <div class="footer-logo">
                <h2>Orion</h2>
                <p>Seu dinheiro com segurança e tecnologia.</p>
            </div>

            <div class="footer-box2">
                <h3>Links úteis</h3>
                <ul>
                    <li><a href="#">Sobre nós</a></li>
                    <li><a href="#">Serviços</a></li>
                    <li><a href="#">Ajuda</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </div>

            <div class="footer-box3">
                <h3>Contato</h3>
                <p>Email: suporte@Orion.com</p>
                <p>Telefone: (27) 99999-9999</p>
            </div>
        </div>

        <div class="footer-box4">
            <p>© 2026 Banco Orion - Todos os direitos reservados</p>
        </div>
    </footer>
